<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- CSS -->
    <link rel="stylesheet" href="../style/style.css" />
    <link rel="stylesheet" href="../style/locations.css" />
    <!-- FONT -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />

    <!-- BOOTSTRAP -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
    <title>Địa điểm</title>
  </head>
  <body style="background-color: var(--background-color)">
    <!-- navbar -->
    <header>
      <nav class="navbar">
        <div class="nav-left">
          <a href="../index.html">Home</a>
          <a href="./locations.html">Locations</a>
          <a href="./contacts.html">Contacts</a>
        </div>
        <a class="logo" href="../index.html">Morning Cup </a>
        <div class="nav-right">
          <a href="./about.html">About</a>
          <a href="./menu.html">Menu</a>
          <a href="./shoppingcart.html">
            <i class="fa fa-shopping-cart shop_cart" aria-hidden="true"></i>
            <span class="cart_count">0</span>
          </a>
          <div id="accountArea">
            <a href="login.html">
              <button class="btn_account" id="cartCount">Đăng nhập</button>
            </a>
          </div>
        </div>
      </nav>
    </header>

    <!-- locations / form -->
    <section class="booking-section">
      <div class="container">
        <h1 class="text-center">ĐẶT BÀN LIÊN HỆ</h1>

        <div class="row g-5">
          <!-- LEFT -->
          <div class="col-lg-6">
            <div>
              <div class="mb-5">
                <h3>Địa chỉ</h3>
                <p>180 đường Cao Lỗ, phường Bình Hưng, TP Hồ Chí Minh</p>
              </div>

              <div class="mb-5">
                <h3>Điện thoại</h3>
                <p>0356509906</p>
              </div>

              <div class="mb-5">
                <h3>Giờ hoạt động</h3>
                <p>06:00-23:00 (hằng ngày)</p>
              </div>

              <div class="mb-5">
                <h3>Email</h3>
                <p>morningcup@gmail.com</p>
              </div>

              <div class="map">
                <img src="../img/GPS.png" alt="Google Map" />
              </div>
            </div>
          </div>

          <!-- RIGHT -->
          <div class="col-lg-6">
            <form>
              <div class="mb-3">
                <label class="form-label"> Họ và tên </label>
                <input type="text" class="form-control" required />
              </div>

              <div class="mb-3">
                <label class="form-label"> Số điện thoại </label>
                <input type="tel" class="form-control" required />
              </div>

              <div class="mb-3">
                <label class="form-label"> Email </label>
                <input type="email" class="form-control" required />
              </div>

              <div class="mb-3">
                <label class="form-label"> Số người </label>
                <input type="number" class="form-control" required />
              </div>

              <div class="mb-3">
                <label class="form-label"> Ngày đặt bàn </label>
                <input type="date" class="form-control" required />
              </div>

              <div class="mb-4">
                <label class="form-label"> Ghi chú </label>
                <textarea class="form-control" rows="3"></textarea>
              </div>

              <div class="text-center">
                <button type="submit" class="btn-send">Gửi</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </section>

    <script src="../javascript/afterlogin.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- CSS -->
    <link rel="stylesheet" href="../style/style.css" />
    <link rel="stylesheet" href="../style/profile.css" />
    <!-- FONT -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />

    <!-- BOOTSTRAP -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
    <title>Profile</title>
  </head>
  <body style="background-color: var(--background-color)">
    <!-- navbar -->
    <header class="menu-desktop">
      <nav class="navbar">
        <div class="nav-left">
          <a href="../index.html">Home</a>
          <a href="./locations.html">Locations</a>
          <a href="./contacts.html">Contacts</a>
        </div>
        <a class="logo" href="../index.html">Morning Cup </a>
        <div class="nav-right">
          <a href="./about.html">About</a>
          <a href="./menu.html">Menu</a>
          <a href="./shoppingcart.html">
            <i class="fa fa-shopping-cart shop_cart" aria-hidden="true"></i>
            <span class="cart_count" id="cartCount">0</span>
          </a>
          <div id="accountArea">
            <a href="login.html">
              <button class="btn_account">Đăng nhập</button>
            </a>
          </div>
        </div>
      </nav>
    </header>
    <!-- HEADER MOBILE -->
    <header class="menu-mobile">
      <nav class="navbar">
        <!-- Logo -->
        <a class="logo" href="../index.html">Morning Cup</a>

        <!-- Nút menu mobile -->
        <div class="menu-toggle" id="menuToggle">
          <i class="fa-solid fa-bars"></i>
        </div>

        <!-- Menu -->
        <div class="nav-menu" id="navMenu">
          <div class="nav-left">
            <a href="index.html">Home</a>
            <a href="pages/locations.html">Locations</a>
            <a href="pages/contacts.html">Contacts</a>
          </div>

          <div class="nav-right">
            <a href="pages/about.html">About</a>
            <a href="pages/menu.html">Menu</a>

            <a href="pages/shoppingcart.html">
              <i class="fa fa-shopping-cart shop_cart"></i>
              <span class="cart_count">0</span>
            </a>

            <div id="accountArea">
              <a href="pages/login.html">
                <button class="btn_account">Đăng nhập</button>
              </a>
            </div>
          </div>
        </div>
      </nav>
    </header>

    <!-- PROFILE -->
    <div class="profile-container">
      <div class="profile-card">
        <div class="profile-header">
          <img
            id="avatar"
            src="../img/profile.png"
            alt="Avatar"
            class="avatarp"
          />
        </div>

        <div class="profile-info">
          <div class="info-item">
            <strong>Tên đăng nhập:</strong>
            <span id="profileUsername"></span>
          </div>

          <div class="info-item">
            <strong>Email:</strong>
            <span id="profileEmail"></span>
          </div>
        </div>

        <button id="logoutBtn2" class="logout-btn">Đăng xuất</button>
      </div>
    </div>
    <script src="../javascript/profile.js"></script>
    <script src="../javascript/everything.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
